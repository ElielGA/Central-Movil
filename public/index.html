<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Central Móvil</title>
    <link rel="icon" type="image/png" href="imagenes/llamada-telefonica.png?v=2">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f8fafc; }
        
        .login-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border-top: 5px solid #0f172a; }
        .login-container h1 { color: #0f172a; font-size: 24px; margin-bottom: 5px; }
        .login-container p { color: #64748b; font-size: 14px; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 13px; color: #475569; margin-bottom: 5px; font-weight: 500; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; background-color: #f8fafc; }
        
        .btn-primary { width: 100%; padding: 12px; background-color: #0f172a; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px; margin-top: 10px; }
        .btn-primary:hover { background-color: #0f172a; }
    </style>
</head>
<body>

<div class="login-container">
    <h1 id="tituloPrincipal">Iniciar Sesión</h1>
    <p id="subtitulo">Ingresa tus credenciales para acceder a la red.</p>
    
    <form id="loginForm">
        <div class="form-group"><label>Usuario</label><input type="text" id="user" class="form-control" required></div>
        <div class="form-group"><label>Contraseña</label><input type="password" id="pass" class="form-control" required></div>
        <button type="submit" class="btn-primary">ENTRAR</button>
    </form>

    <form id="registroForm" style="display: none;">
        <div class="form-group"><label>Nombre Completo</label><input type="text" id="regNombre" class="form-control" required></div>
        <div class="form-group"><label>Usuario</label><input type="text" id="regUser" class="form-control" required></div>
        <div class="form-group"><label>Contraseña</label><input type="password" id="regPass" class="form-control" required></div>
        <button type="submit" class="btn-primary">CREAR CUENTA</button>
    </form>

    <div style="margin-top: 20px; font-size: 13px;">
        <p id="toggleText">¿No tienes cuenta? <a href="#" onclick="toggleMode()">Regístrate aquí</a></p>
    </div>
</div>

<script>
    function toggleMode() {
        const login = document.getElementById('loginForm');
        const reg = document.getElementById('registroForm');
        const tit = document.getElementById('tituloPrincipal');
        const sub = document.getElementById('subtitulo');
        const toggle = document.getElementById('toggleText');

        if (login.style.display === 'none') {
            login.style.display = 'block'; reg.style.display = 'none';
            tit.innerText = "Iniciar Sesión"; sub.innerText = "Ingresa tus credenciales para acceder a la red.";
            toggle.innerHTML = '¿No tienes cuenta? <a href="#" onclick="toggleMode()">Regístrate aquí</a>';
        } else {
            login.style.display = 'none'; reg.style.display = 'block';
            tit.innerText = "Registro"; sub.innerText = "Registra tu usuario para acceder a la red.";
            toggle.innerHTML = '¿Ya tienes cuenta? <a href="#" onclick="toggleMode()">Inicia sesión aquí</a>';
        }
    }

    // Lógica de Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const res = await fetch('/api/login', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username: document.getElementById('user').value, password: document.getElementById('pass').value })
        });
        if(res.ok) {
            const data = await res.json();
            localStorage.setItem('cm_usuario_nombre', data.nombre);
            localStorage.setItem('cm_usuario_rol', data.rol);
            window.location.href = 'perfil.html';
        } else { alert("Credenciales incorrectas"); }
    });

    // Lógica de Registro
    document.getElementById('registroForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const res = await fetch('/api/registro', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                nombre: document.getElementById('regNombre').value,
                username: document.getElementById('regUser').value,
                password: document.getElementById('regPass').value,
                rol: 'CLIENTE'
            })
        });
        if(res.ok) { alert("Usuario creado con éxito"); toggleMode(); }
        else { alert("Error al registrar"); }
    });

    
</script>

</body>
</html>
